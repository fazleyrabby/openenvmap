services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: openenvmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openenvmap"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/openenvmap
      API_PORT: 3000
      OPENAQ_API_KEY: ${OPENAQ_API_KEY}
    volumes:
      - ./apps/api/src:/app/src

  web:
    build:
      context: ./apps/web
      target: dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/vite.config.ts:/app/vite.config.ts

volumes:
  postgres_data:
